name: 기능 제안
description: 복습 경험, 템플릿 또는 플랫폼 출력 개선 아이디어를 제안해 주세요.
title: "[제안] "
body:
  - type: markdown
    attributes:
      value: |
        제안해 주셔서 감사합니다. 실제 강의 자료 대신 일반화한 예시를 사용해 주세요.
  - type: textarea
    id: problem
    attributes:
      label: 어떤 불편함을 해결하고 싶나요?
      description: 기능 설명보다 먼저 현재 겪고 있는 문제를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 해결 방법
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: 사용 예시
      description: 사용자가 어떤 문장으로 요청하고 어떤 결과를 받으면 좋은지 작성해 주세요.
  - type: checkboxes
    id: safety
    attributes:
      label: 자료 보호 확인
      options:
        - label: 제안에 제한된 강의 원문이나 개인정보를 포함하지 않았습니다.
          required: true
